name: Dependency Audit

on:
  push:
    branches: [main]
    paths: ['package.json', 'package-lock.json']
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit-report.json 2>&1 || true
          cat audit-report.json

      - name: Check for vulnerabilities
        run: |
          set +e
          AUDIT_OUTPUT=$(npm audit 2>&1)
          CRITICAL=$(echo "$AUDIT_OUTPUT" | grep -c "critical" || echo "0")
          HIGH=$(echo "$AUDIT_OUTPUT" | grep -c "high" || echo "0")
          
          echo "Critical vulnerabilities found: $CRITICAL"
          echo "High vulnerabilities found: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          
          if [ "$HIGH" -gt 0 ]; then
            echo "⚠️ Warning: Found $HIGH high severity vulnerabilities"
          fi
          
          echo "✅ No critical vulnerabilities found"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
        if: always()

  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check for outdated packages
        run: npm outdated --json > outdated-report.json || true

      - name: Report outdated packages
        run: |
          if [ -s outdated-report.json ]; then
            echo "📦 Some packages are outdated. Review with: npm outdated"
          fi

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-report
          path: outdated-report.json
        if: always()
